<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Utenti (API)</title>


    <!-- QUI HO USATO GEMINI -->


    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            padding: 30px;
        }

        h1 {
            margin-bottom: 10px;
        }

        button {
            padding: 8px 15px;
            border: none;
            background: #3b82f6;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
        }

        button:hover {
            background: #2563eb;
        }

        .container {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .card h3 {
            margin: 0;
        }

        .card p {
            margin: 5px 0 0 0;
            color: #555;
        }

        .color-change {
            background: #dbeafe;
        }
    </style>
</head>

<body>

    <h1>Utenti (API)</h1>

    <button id="loadUsers">Carica utenti</button>
    <button id="changeColor">Cambia colore card</button>

    <div class="container" id="usersContainer"></div>

    <script>

        const container = document.getElementById("usersContainer");
        const loadBtn = document.getElementById("loadUsers");
        const colorBtn = document.getElementById("changeColor");

        loadBtn.addEventListener("click", fetchUsers);

        function fetchUsers() {

            fetch("https://jsonplaceholder.typicode.com/users")
                .then(response => response.json())
                .then(users => {

                    container.innerHTML = "";

                    users.forEach(user => {

                        const card = document.createElement("div");
                        card.classList.add("card");

                        card.innerHTML = `
                <h3>${user.name}</h3>
                <p>${user.email}</p>
            `;

                        container.appendChild(card);
                    });

                });

        }

        colorBtn.addEventListener("click", () => {

            const cards = document.querySelectorAll(".card");

            cards.forEach(card => {
                card.classList.toggle("color-change");
            });

        });

    </script>

</body>

</html>
