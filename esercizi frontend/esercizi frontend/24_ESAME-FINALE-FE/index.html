<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Esame-FE-CARD</title>
</head>

<body>
    <div class="container">
        <div class="card1">

            <img src="IMG/image.jpg" class="product-img">

            <button class="like">&#10084;</button>

            <div class="container-buttons">
                <h2 class="promo">CAMBIO20</h2>
                <h2 class="promo red">PROMO</h2>
            </div>
        </div>

        <div class="container2">
            <h3 class="brand">Calvin Klein</h3>
            <p class="model">Sneaker basse - off white/navy</p>
            <p class="price">
                <span class="current-price">76,99 €</span>
            </p>
            <p class="old-price">
                Prezzo mediano: <span class="euro">109,99 €</span>
            </p>


        </div>
    </div>
</body>

</html>
